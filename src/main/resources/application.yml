spring:
  profiles:
    active: ${SPRING_PROFILE:local}

  security:
    oauth2:
      client:
        registration:
          google:
            client-name: google
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            scope:
              - email

          kakao:
            client-name: kakao
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname

          naver:
            client-name: naver
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: ${NAVER_REDIRECT_URI}
            authorization-grant-type: authorization_code
            scope:
              - email


        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

    login:
      success-redirect-uri: ${SECURITY_LOGIN_SUCCESS_REDIRECT_URI}
      not-registered-redirect-uri: ${SECURITY_NOT_REGISTERED_REDIRECT_URI}

jwt:
  cookie-domain: ${JWT_COOKIE_DOMAIN:localhost}
  access-token-expiration-time: ${JWT_ACCESS_TOKEN_EXPIRATION_TIME}
  refresh-token-expiration-time: ${JWT_REFRESH_TOKEN_EXPIRATION_TIME}
  secret-key: ${JWT_SECRET_KEY}

cloud:
  aws:
    credentials:
      access-key: ${AWS_IAM_ACCESS_KEY:test}
      secret-key: ${AWS_IAM_SECRET_KEY:test}
    s3:
      endpoint:
      bucket:
        name: ${AWS_S3_BUCKET_NAME:test-bucket}
        expiration-time: ${AWS_S3_EXPIRATION_TIME:259200000}
      save-path:
        resume: ${AWS_S3_SAVE_PATH_RESUME:/resume}
        portfolio: ${AWS_S3_SAVE_PATH_PORTFOLIO:/portfolio}
      region:
        auto: false
        static: ${AWS_REGION:ap-northeast-2}
      stack:
        auto: false

recruitment:
  api:
    public:
      url: https://apis.data.go.kr/1051000/recruitment
      key: ${PUBLIC_DATA_API_KEY}